services:
  - type: web
    name: bharath-portfolio
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bharath-portfolio-db
          property: connectionString
    autoDeploy: false

databases:
  - name: bharath-portfolio-db
    databaseName: portfolio
    plan: free
